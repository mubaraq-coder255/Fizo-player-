<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Player - Burudani Kiganjani Mwako</title>
    <style>
        /* Muonekano wa Kishua (Gold & Dark Theme) */
        body {
            background-color: #1a1a1a; /* Rangi ya giza kwa nyuma */
            color: #d4af37; /* Rangi ya Gold kwa maandishi */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #262626;
            border: 2px solid #d4af37; /* Fremu ya Gold */
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Nembo Yako */
        .logo {
            width: 150px;
            height: auto;
            border-radius: 50%;
            border: 3px solid #d4af37;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.slogan {
            font-style: italic;
            font-size: 14px;
            color: #f9e29b;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #d4af37;
            border-radius: 8px;
            background: #333;
            color: white;
            box-sizing: border-box;
        }

        button {
            background-color: #d4af37;
            color: #000;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #f9e29b;
            transform: scale(1.02);
        }

        /* Sehemu ya Video itakapotokea */
        #video-container {
            margin-top: 25px;
            width: 100%;
        }

        iframe {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #d4af37;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="fizo-logo.png" alt="Fizo Movies Logo" class="logo">
        
        <h1>Fizo Movies Player</h1>
        <p class="slogan">"Burudani Kiganjani Mwako"</p>

        <input type="text" id="terabox-url" placeholder="Weka TeraBox Link Hapa...">
        <button onclick="fetchVideo()">CHEZA MUVI SASA</button>

        <div id="video-container">
            </div>
    </div>

    <script>
        function fetchVideo() {
            const url = document.getElementById('terabox-url').value;
            const container = document.getElementById('video-container');
            
            if(url) {
                // Hapa tunaweka mfumo wa ku-fetch (unategemea API ya player uliyochagua)
                // Kwa mfano huu, tunatumia mfumo wa embed wa kitalamu
                container.innerHTML = `<p style='color:white;'>Inapakia video...</p>`;
                
                // Mfano wa jinsi video inavyoweza kutokea (Iframe)
                setTimeout(() => {
                    container.innerHTML = `<iframe height="250" src="${url}" frameborder="0" allowfullscreen></iframe>`;
                }, 1000);
            } else {
                alert("Tafadhali weka link kwanza!");
            }
        }
    </script>

</body>
</html>
