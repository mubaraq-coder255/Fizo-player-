<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Player</title>
    <style>
        body { background-color: #1a1a1a; color: #d4af37; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #262626; border: 2px solid #d4af37; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 120px; border-radius: 50%; border: 2px solid #d4af37; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #d4af37; background: #333; color: white; box-sizing: border-box; }
        button { background-color: #d4af37; color: black; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <img src="fizo-logo.png" class="logo">
        <h1>FIZO MOVIES</h1>
        <p>"Burudani Kiganjani Mwako"</p>
        <input type="text" id="link" placeholder="Weka Link ya TeraBox hapa...">
        <button onclick="funguaMuvi()">CHEZA MUVI SASA</button>
        <p style="font-size: 10px; margin-top: 20px; color: #888;">Kidokezo: Muvi itafunguka salama kwenye ukurasa mpya.</p>
    </div>

    <script>
        function funguaMuvi() {
            var url = document.getElementById('link').value;
            if(url) {
                // Hapa tunatumia 'replace' ili kuifanya link iwe ya kucheza moja kwa moja
                var playUrl = url.replace("terabox.com", "terabox.beer");
                playUrl = playUrl.replace("1024terabox.com", "terabox.beer");
                
                // Hii inafungua muvi bila kizuizi chochote!
                window.location.href = "https://www.terabox.beer/play?url=" + encodeURIComponent(url);
            } else {
                alert("Tafadhali weka link!");
            }
        }
    </script>
</body>
</html>
