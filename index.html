<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Player - Burudani Kiganjani Mwako</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #d4af37;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #262626;
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo {
            width: 150px;
            height: auto;
            border-radius: 50%;
            border: 3px solid #d4af37;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.slogan {
            font-style: italic;
            font-size: 13px;
            color: #f9e29b;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #d4af37;
            border-radius: 10px;
            background: #333;
            color: white;
            box-sizing: border-box;
            text-align: center;
        }

        button {
            background-color: #d4af37;
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #f9e29b;
            transform: scale(1.02);
        }

        .note {
            margin-top: 15px;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="fizo-logo.png" alt="Fizo Movies Logo" class="logo">
        
        <h1>FIZO MOVIES PLAYER</h1>
        <p class="slogan">"Burudani Kiganjani Mwako"</p>

        <input type="text" id="terabox-url" placeholder="Paste Link ya TeraBox hapa...">
        <button onclick="playMovie()">CHEZA MUVI SASA</button>

        <p class="note">Muvi itafunguka kwenye ukurasa mpya kwa ubora wa HD.</p>
    </div>

    <script>
        function playMovie() {
            const url = document.getElementById('terabox-url').value;
            if(url) {
                // Tunatumia terabox.beer ambayo inakubali video kucheza bila kuzuia
                const cleanUrl = url.trim();
                const playerUrl = "https://www.terabox.beer/play?url=" + cleanUrl;
                
                // Hii inafungua muvi moja kwa moja
                window.open(playerUrl, "_blank");
            } else {
                alert("Tafadhali weka link kwanza!");
            }
        }
    </script>

</body>
</html>
