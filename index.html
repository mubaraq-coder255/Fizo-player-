<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Player</title>
    <style>
        body { background-color: #1a1a1a; color: #d4af37; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .container { background-color: #262626; border: 2px solid #d4af37; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; }
        .logo { width: 120px; border-radius: 50%; border: 2px solid #d4af37; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #d4af37; background: #333; color: white; box-sizing: border-box; text-align: center; }
        button { background-color: #d4af37; color: black; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="fizo-logo.png" class="logo">
        <h1>FIZO MOVIES</h1>
        <p>"Burudani Kiganjani Mwako"</p>
        <input type="text" id="link" placeholder="Weka Link ya TeraBox hapa...">
        <button onclick="funguaMuvi()">CHEZA MUVI SASA</button>
        <p style="font-size: 11px; margin-top: 20px; color: #888;">
            Ukifungua link, utaweza ku-play, kudownload, au kusave muvi kwenye akaunti yako ya TeraBox.
        </p>
    </div>

    <script>
        function funguaMuvi() {
            var url = document.getElementById('link').value;
            if(url) {
                // Hii inampeleka mteja kwenye link ya asili ya TeraBox 
                // Ambapo ana control zote (Play/Download/Save)
                window.open(url, "_blank");
            } else {
                alert("Tafadhali weka link ya muvi kwanza!");
            }
        }
    </script>
</body>
</html>
